services:
  routerai-proxy:
    build: .
    container_name: routerai-proxy
    ports:
      - "8900:8900"
    volumes:
      - ./api_keys.json:/app/api_keys.json
      - ./providers.json:/app/providers.json
      - routerai-logs:/app
    env_file:
      - .env
    environment:
      - TZ=Asia/Bangkok
    command: python src/proxy.py --host 0.0.0.0 --port 8900
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8900/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  routerai-dashboard:
    build: .
    container_name: routerai-dashboard
    ports:
      - "8899:8899"
    volumes:
      - ./api_keys.json:/app/api_keys.json
      - ./providers.json:/app/providers.json
    env_file:
      - .env
    environment:
      - TZ=Asia/Bangkok
      - PROXY_URL=http://routerai-proxy:8900
    command: python src/dashboard.py --host 0.0.0.0 --port 8899
    restart: unless-stopped
    depends_on:
      routerai-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8899/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  routerai-logs:
