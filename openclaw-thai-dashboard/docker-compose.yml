version: "3.8"
services:
  routerai:
    build: .
    container_name: openclaw-thai-dashboard
    ports:
      - "8900:8900"
      - "8899:8899"
    volumes:
      - ./api_keys.json:/app/api_keys.json
      - ${OPENCLAW_HOME:-~/.openclaw}:/root/.openclaw
    env_file:
      - .env
    restart: unless-stopped
